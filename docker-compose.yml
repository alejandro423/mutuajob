version: "3.9"

services:
  app:
    build:
      context: .
    container_name: mutuajob_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db

  web:
    image: nginx:latest
    container_name: mutuajob_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: mutuajob_db
    restart: always
    environment:
      MYSQL_DATABASE: mutuajob
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: mutuajob
      MYSQL_PASSWORD: mutuajob
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: